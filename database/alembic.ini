[alembic]
script_location = migrations
prepend_sys_path = .
version_path_separator = os

# DSN is supplied at runtime via `-x dburl=...` or the SOLILOS_DB_URL env var
# (see migrations/env.py). Default to a local file for local-dev convenience.
sqlalchemy.url = sqlite:///solilos.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
