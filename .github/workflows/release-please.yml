name: release-please

# Maintains a release PR (version bump + CHANGELOG from conventional commits).
# Merging that PR cuts the `vX.Y.Z` tag + GitHub release.
#
# NOTE on the GITHUB_TOKEN no-recursion rule (#256): the tag/release created by
# release-please via GITHUB_TOKEN does NOT trigger build-images.yml (on: push
# tags v*) — GitHub deliberately blocks that recursion. The dispatch step below
# is a best-effort workaround; `gh workflow run` via GITHUB_TOKEN may also be
# subject to the same rule. The robust fix is a fine-grained PAT stored as the
# RELEASE_PLEASE_TOKEN secret (operator must add it and swap the token: field).
# Until then, a manual `gh workflow run build-images.yml --ref vX.Y.Z` works.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # Best-effort: trigger build-images for the new tag. GITHUB_TOKEN dispatch
      # may be blocked by the same no-recursion rule as push events (#256).
      # If this step is a no-op, use: gh workflow run build-images.yml --ref <tag>
      - name: Trigger image build for release tag
        if: ${{ steps.release.outputs.release_created }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run build-images.yml --ref ${{ steps.release.outputs.tag_name }}
