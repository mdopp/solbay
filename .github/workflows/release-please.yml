name: release-please

# Maintains a release PR (version bump + CHANGELOG from conventional commits).
# Merging that PR cuts the `vX.Y.Z` tag + GitHub release.
#
# NOTE on the GITHUB_TOKEN no-recursion rule (#256): the tag/release created by
# release-please via GITHUB_TOKEN does NOT trigger build-images.yml (on: push
# tags v*) — GitHub deliberately blocks that recursion. The dispatch step below
# is a best-effort workaround; `gh workflow run` via GITHUB_TOKEN may also be
# subject to the same rule. The robust fix is a fine-grained PAT stored as the
# RELEASE_PLEASE_TOKEN secret (operator must add it and swap the token: field).
# Until then, a manual `gh workflow run build-images.yml --ref vX.Y.Z` works.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # Trigger build-images for the new tag (a tag pushed by GITHUB_TOKEN does
      # not fire build-images' own `on: push: tags` — GitHub's no-recursion
      # rule, #256). `-R` is load-bearing: the job has no checkout, so without an
      # explicit repo `gh workflow run` dies with "fatal: not a git repository"
      # (observed v0.6.0) and the images are never published for the tag.
      - name: Trigger image build for release tag
        if: ${{ steps.release.outputs.release_created }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >-
          gh workflow run build-images.yml
          --repo ${{ github.repository }}
          --ref ${{ steps.release.outputs.tag_name }}
