name: build-images

# Build and publish container images for Solilos.
#
# - On push to `main` and tags `v*`: builds + pushes to GHCR.
# - On pull requests touching image sources: builds without pushing,
#   so Dockerfiles are validated before merge.

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'voice-gatekeeper/**'
      - 'database/**'
      - 'abs-mcp/**'
      - 'hermes-chat/**'
      - '.github/workflows/build-images.yml'
  pull_request:
    paths:
      - 'voice-gatekeeper/**'
      - 'database/**'
      - 'abs-mcp/**'
      - 'hermes-chat/**'
      - '.github/workflows/build-images.yml'

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: solilos-gatekeeper
            context: voice-gatekeeper
            description: "Solilos Wyoming-to-Hermes bridge — STT/TTS pipeline orchestration, Phase-2 speaker ID. Runs as a container inside the SolBay pod; reaches ServiceBay's voice template via host loopback (both pods hostNetwork)."
          - image: solilos-schema-init
            context: database
            description: "Solilos schema-init sidecar — runs alembic upgrade head against the SolBay pod's local SQLite (solilos.db) on every pod start. Idempotent."
          - image: solilos-abs-mcp
            context: abs-mcp
            description: "Solilos Audiobookshelf MCP shim — read-only library search/availability over the Audiobookshelf REST API, exposed to Hermes as a streamable-HTTP MCP server. Runs as a container inside the SolBay pod."
          - image: solilos-chat
            context: hermes-chat
            description: "Solilos chat — stateless aiohttp proxy serving a static chat page over Hermes' native session API. Reads the Authelia Remote-User header for SSO; holds API_SERVER_KEY server-side. Replaces the fragile in-process hermes-webui."
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check Dockerfile exists
        id: check
        run: |
          if [ -f "${{ matrix.context }}/Dockerfile" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::${{ matrix.context }}/Dockerfile not present on this ref; skipping ${{ matrix.image }} build."
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        if: steps.check.outputs.exists == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: steps.check.outputs.exists == 'true' && github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        if: steps.check.outputs.exists == 'true'
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}
          labels: |
            org.opencontainers.image.title=${{ matrix.image }}
            org.opencontainers.image.description=${{ matrix.description }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=MIT

      - name: Build (and push on main/tags)
        if: steps.check.outputs.exists == 'true'
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
          platforms: linux/amd64
