name: ci

# Lint + test + scan the Python in OSCAR (voice-gatekeeper bridge, database/alembic,
# the Hermes plugin entrypoint, ServiceBay post-deploy scripts). Image builds
# live in build-images.yml; template-/skill-/docs-only changes are gated by
# real-box /verify, not CI.

on:
  pull_request:
    paths:
      - '**/*.py'
      - '**/pyproject.toml'
      - 'ruff.toml'
      - '.pre-commit-config.yaml'
      - 'scripts/**'
      - '.github/workflows/ci.yml'
  push:
    branches: [main]
    paths:
      - '**/*.py'
      - '**/pyproject.toml'
      - 'ruff.toml'
      - '.pre-commit-config.yaml'
      - 'scripts/**'
      - '.github/workflows/ci.yml'

permissions:
  contents: read

jobs:
  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install ruff==0.15.12
      - run: ruff check .
      - run: ruff format --check .

  test:
    name: pytest + diff-coverage (voice-gatekeeper)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # full history + main ref so check-diff-coverage.py can diff vs the merge base
          fetch-depth: 0
      - run: git fetch origin main:refs/remotes/origin/main || true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install -e '.[test]'
        working-directory: voice-gatekeeper
      - run: pytest -q --cov=gatekeeper --cov-report=xml
        working-directory: voice-gatekeeper
      # Gate 2: new-code coverage only (changed gatekeeper lines ≥ floor). No-op
      # when a PR changes no gatekeeper source. Ratchet the floor up in the script.
      - run: python scripts/check-diff-coverage.py

  test-abs-mcp:
    name: pytest (abs-mcp)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: abs-mcp
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install -e '.[test]'
      - run: pytest -q

  test-hermes-chat:
    name: pytest (hermes-chat)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hermes-chat
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install -e '.[test]'
      - run: pytest -q

  semgrep:
    name: semgrep (report-only)
    runs-on: ubuntu-latest
    # Report-only first (gate 1): findings surface in the log but don't block.
    # Promote to blocking by removing continue-on-error once the baseline is
    # triaged (add suppressions / a .semgrep.yml), then pin the semgrep version.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install semgrep
      - run: semgrep scan --config p/python --config p/security-audit --severity ERROR --error --metrics off

  audit:
    name: pip-audit (report-only)
    runs-on: ubuntu-latest
    # Gates 1+4: CVE scan of declared deps. Report-only first; ratchet to
    # blocking on high/critical (remove continue-on-error, add --vulnerability-service)
    # once the baseline is clean. Dependabot (.github/dependabot.yml) opens the
    # update PRs the autoloop routes as a filler track.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install pip-audit
      - run: pip install -e .
        working-directory: voice-gatekeeper
      - run: pip install -e .
        working-directory: database
      - run: pip-audit --desc
