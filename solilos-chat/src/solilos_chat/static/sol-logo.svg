<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 510 175" role="img" aria-label="solilos">
  <defs>
    <radialGradient id="solGold" cx="50%" cy="38%" r="66%">
      <stop offset="0%" stop-color="#fff0cc"/>
      <stop offset="40%" stop-color="#fbbf24"/>
      <stop offset="78%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </radialGradient>
    <radialGradient id="solGlow" cx="50%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#fff3d6" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#fff3d6" stop-opacity="0"/>
    </radialGradient>
    <!-- one "s" glyph, reused at both ends (solilos is a palindrome) -->
    <path id="solS" fill="none" d="M 22 76
      C 22 65 13 60 0 60 C -13 60 -22 65 -22 75
      C -22 84 -13 88 0 93 C 13 98 22 102 22 112
      C 22 123 13 128 0 128 C -13 128 -22 123 -22 113"/>
  </defs>

  <!-- letters: deep slate, rounded geometric strokes (currentColor-friendly) -->
  <g fill="none" stroke="#1e293b" stroke-width="15" stroke-linecap="round" stroke-linejoin="round">
    <use href="#solS" transform="translate(68,0)"/>
    <circle cx="147" cy="94" r="33"/>
    <line x1="205" y1="42" x2="205" y2="130"/>
    <line x1="305" y1="42" x2="305" y2="130"/>
    <circle cx="363" cy="94" r="33"/>
    <use href="#solS" transform="translate(442,0)"/>
  </g>

  <!-- the "i": two nested people on the mirror axis — an outer "vessel" in
       the letters' colour, holding a smaller person glowing from within -->
  <g transform="translate(255 88) scale(1.6) translate(-32 -35)">
    <g fill="#1e293b">
      <circle cx="32" cy="15" r="8.5"/>
      <path d="M32 23.5 C 40.5 23.5 44.5 29.5 44.5 38
        C 44.5 49 41 58 38 62 C 37 63.5 34.5 64 32 64
        C 29.5 64 27 63.5 26 62 C 23 58 19.5 49 19.5 38
        C 19.5 29.5 23.5 23.5 32 23.5 Z"/>
    </g>
    <ellipse cx="32" cy="40" rx="9" ry="17" fill="url(#solGlow)"/>
    <g fill="url(#solGold)">
      <circle cx="32" cy="15.5" r="6"/>
      <path d="M32 26.5 C 39 26.5 41.8 31.5 41.8 38.5
        C 41.8 48 38.8 56 36 59.5 C 35.2 60.7 33.6 61 32 61
        C 30.4 61 28.8 60.7 28 59.5 C 25.2 56 22.2 48 22.2 38.5
        C 22.2 31.5 25 26.5 32 26.5 Z"/>
    </g>
  </g>
</svg>
