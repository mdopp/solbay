<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OSCAR — Chat</title>
  <style>
    :root {
      --bg: #f6f6f4;
      --panel: #ffffff;
      --ink: #1f2227;
      --muted: #6b7079;
      --line: #e4e4e0;
      --accent: #3a6ea5;
      --bubble-me: #eef2f7;
      --bubble-oscar: #f3f3f0;
      --radius: 12px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #16181c;
        --panel: #1d2025;
        --ink: #e8e9ea;
        --muted: #9aa0a8;
        --line: #2a2e34;
        --accent: #7aa7d6;
        --bubble-me: #25303d;
        --bubble-oscar: #232730;
      }
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; overflow: hidden; }
    body {
      font: 15px/1.5 system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--ink);
      display: flex;
      justify-content: center;
    }
    .shell {
      width: 100%;
      max-width: 1040px;
      display: flex;
      height: 100vh;
      min-height: 0;
    }
    .sidebar {
      width: 260px;
      flex: 0 0 260px;
      border-right: 1px solid var(--line);
      background: var(--panel);
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .sidebar .top {
      padding: 14px;
      border-bottom: 1px solid var(--line);
    }
    #new-session {
      width: 100%;
      padding: 9px 12px;
      text-align: center;
    }
    #sessions {
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
      padding: 6px;
    }
    .session {
      padding: 9px 11px;
      border-radius: 9px;
      cursor: pointer;
      margin-bottom: 2px;
    }
    .session:hover { background: var(--bubble-oscar); }
    .session.active { background: var(--bubble-me); }
    .session .title {
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .session .when { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .sessions-empty { padding: 12px; color: var(--muted); font-size: 13px; }
    .app {
      flex: 1 1 auto;
      min-width: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      min-height: 0;
    }
    @media (max-width: 720px) {
      .sidebar { width: 200px; flex-basis: 200px; }
    }
    header {
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      font-weight: 600;
      letter-spacing: 0.2px;
      display: flex;
      align-items: baseline;
      gap: 8px;
    }
    header .sub { font-weight: 400; color: var(--muted); font-size: 13px; }
    #log {
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .msg { max-width: 80%; padding: 10px 13px; border-radius: var(--radius); word-wrap: break-word; overflow-wrap: anywhere; }
    .msg.me { align-self: flex-end; background: var(--bubble-me); white-space: pre-wrap; }
    .msg.oscar { align-self: flex-start; background: var(--bubble-oscar); }
    .msg.system { align-self: center; color: var(--muted); background: none; font-size: 13px; padding: 4px; }
    .role { display: block; font-size: 11px; color: var(--muted); margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.5px; }

    /* Rendered-markdown spacing inside an assistant bubble. */
    .md > :first-child { margin-top: 0; }
    .md > :last-child { margin-bottom: 0; }
    .md p { margin: 0 0 8px; }
    .md ul, .md ol { margin: 0 0 8px; padding-left: 22px; }
    .md li { margin: 2px 0; }
    .md h1, .md h2, .md h3, .md h4, .md h5, .md h6 { margin: 10px 0 6px; line-height: 1.3; }
    .md h1 { font-size: 1.4em; } .md h2 { font-size: 1.25em; } .md h3 { font-size: 1.1em; }
    .md a { color: var(--accent); }
    .md code {
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
      font-size: 0.92em;
      background: rgba(127, 127, 127, 0.18);
      padding: 1px 5px;
      border-radius: 5px;
    }
    .md pre {
      margin: 0 0 8px;
      padding: 10px 12px;
      background: rgba(127, 127, 127, 0.14);
      border-radius: 8px;
      overflow-x: auto;
    }
    .md pre code { background: none; padding: 0; font-size: 0.9em; }
    .md blockquote {
      margin: 0 0 8px;
      padding: 2px 12px;
      border-left: 3px solid var(--line);
      color: var(--muted);
    }
    .md hr { border: none; border-top: 1px solid var(--line); margin: 10px 0; }

    /* Activity / thinking indicator. */
    .activity { display: flex; align-items: center; gap: 8px; color: var(--muted); font-size: 13px; }
    .dots { display: inline-flex; gap: 3px; }
    .dots span {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--muted); opacity: 0.4;
      animation: blink 1.2s infinite ease-in-out;
    }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%, 80%, 100% { opacity: 0.3; } 40% { opacity: 1; } }
    form {
      display: flex;
      gap: 8px;
      padding: 14px 18px;
      border-top: 1px solid var(--line);
      background: var(--panel);
    }
    textarea {
      flex: 1;
      resize: none;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 10px 12px;
      font: inherit;
      line-height: 1.4;
      background: var(--bg);
      color: var(--ink);
      max-height: 168px;
      overflow-y: auto;
    }
    textarea:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
    button {
      border: none;
      border-radius: var(--radius);
      padding: 0 18px;
      background: var(--accent);
      color: #fff;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
    }
    button:disabled { opacity: 0.5; cursor: default; }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="top">
        <button id="new-session" type="button">+ New session</button>
      </div>
      <div id="sessions"></div>
    </aside>
    <div class="app">
      <header>OSCAR <span class="sub">household chat</span></header>
      <div id="log" aria-live="polite"></div>
      <form id="composer">
        <textarea id="input" rows="1" placeholder="Message OSCAR…" autofocus></textarea>
        <button id="send" type="submit">Send</button>
      </form>
    </div>
  </div>
  <script src="/static/markdown.js"></script>
  <script>
    (function () {
      var log = document.getElementById("log");
      var form = document.getElementById("composer");
      var input = document.getElementById("input");
      var send = document.getElementById("send");
      var sessionsEl = document.getElementById("sessions");
      var newBtn = document.getElementById("new-session");
      var sessionId = null;

      function atBottom() {
        return log.scrollHeight - log.scrollTop - log.clientHeight < 40;
      }
      function scrollDown(stick) {
        if (stick) log.scrollTop = log.scrollHeight;
      }

      function addText(role, text) {
        var el = document.createElement("div");
        el.className = "msg " + role;
        if (role !== "system") {
          var label = document.createElement("span");
          label.className = "role";
          label.textContent = role === "me" ? "You" : "OSCAR";
          el.appendChild(label);
        }
        el.appendChild(document.createTextNode(text));
        log.appendChild(el);
        scrollDown(true);
        return el;
      }

      // An assistant bubble that accumulates streamed text and re-renders it
      // as markdown. Holds a role label + a thinking indicator until the
      // first token, then a `.md` body.
      function addAssistant() {
        var el = document.createElement("div");
        el.className = "msg oscar";
        var label = document.createElement("span");
        label.className = "role";
        label.textContent = "OSCAR";
        el.appendChild(label);

        var activity = document.createElement("div");
        activity.className = "activity";
        activity.innerHTML =
          '<span class="dots"><span></span><span></span><span></span></span>' +
          '<span class="activity-text">thinking…</span>';
        el.appendChild(activity);

        var body = document.createElement("div");
        body.className = "md";
        el.appendChild(body);
        log.appendChild(el);
        scrollDown(true);

        var buffer = "";
        return {
          setActivity: function (txt) {
            var t = activity.querySelector(".activity-text");
            if (t) t.textContent = txt;
          },
          append: function (delta) {
            var stick = atBottom();
            if (activity.parentNode) el.removeChild(activity);
            buffer += delta;
            body.innerHTML = window.renderMarkdown(buffer);
            scrollDown(stick);
          },
          finish: function () {
            if (activity.parentNode) el.removeChild(activity);
            if (!buffer) body.textContent = "(no reply)";
            else body.innerHTML = window.renderMarkdown(buffer);
            scrollDown(atBottom());
          },
          fail: function (msg) {
            el.removeChild(activity);
            el.className = "msg system";
            body.textContent = msg;
          }
        };
      }

      function autosize() {
        input.style.height = "auto";
        input.style.height = Math.min(input.scrollHeight, 168) + "px";
      }
      input.addEventListener("input", autosize);

      input.addEventListener("keydown", function (e) {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          form.requestSubmit();
        }
      });

      // Parse the proxy's SSE stream incrementally (fetch + ReadableStream;
      // EventSource can't POST a body).
      function streamChat(text, msg) {
        return fetch("/api/chat/stream", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ input: text, session_id: sessionId })
        }).then(function (r) {
          if (!r.ok || !r.body) throw new Error("bad response");
          var reader = r.body.getReader();
          var decoder = new TextDecoder();
          var buf = "";

          function handle(event, data) {
            var d = {};
            try { d = JSON.parse(data); } catch (e) {}
            if (event === "session") {
              if (d.session_id) sessionId = d.session_id;
            } else if (event === "delta") {
              if (d.text) msg.append(d.text);
            } else if (event === "tool") {
              if (d.phase === "started") msg.setActivity("using " + (d.name || "tool") + "…");
              else msg.setActivity("thinking…");
            } else if (event === "error") {
              msg.fail("OSCAR is unavailable right now. Please try again.");
            }
          }

          function flush() {
            var frames = buf.split("\n\n");
            buf = frames.pop();
            frames.forEach(function (frame) {
              var event = "message";
              var data = "";
              frame.split("\n").forEach(function (line) {
                if (line.indexOf("event:") === 0) event = line.slice(6).trim();
                else if (line.indexOf("data:") === 0) data += line.slice(5).replace(/^ /, "");
              });
              handle(event, data);
            });
          }

          function pump() {
            return reader.read().then(function (res) {
              if (res.done) { buf += "\n\n"; flush(); return; }
              buf += decoder.decode(res.value, { stream: true });
              flush();
              return pump();
            });
          }
          return pump();
        });
      }

      form.addEventListener("submit", function (e) {
        e.preventDefault();
        var text = input.value.trim();
        if (!text) return;
        var firstTurn = !sessionId;
        addText("me", text);
        input.value = "";
        autosize();
        send.disabled = true;
        var msg = addAssistant();

        streamChat(text, msg)
          .then(function () { msg.finish(); if (firstTurn) loadSessions(); })
          .catch(function () { msg.fail("Network error. Please try again."); })
          .finally(function () {
            send.disabled = false;
            input.focus();
          });
      });

      // --- Session list ---------------------------------------------------
      function fmtWhen(iso) {
        if (!iso) return "";
        var d = new Date(iso);
        if (isNaN(d.getTime())) return "";
        return d.toLocaleString([], {
          month: "short", day: "numeric", hour: "2-digit", minute: "2-digit"
        });
      }

      function renderSessions(list) {
        sessionsEl.textContent = "";
        if (!list.length) {
          var empty = document.createElement("div");
          empty.className = "sessions-empty";
          empty.textContent = "No sessions yet.";
          sessionsEl.appendChild(empty);
          return;
        }
        list.forEach(function (s) {
          var row = document.createElement("div");
          row.className = "session" + (s.id === sessionId ? " active" : "");
          var title = document.createElement("div");
          title.className = "title";
          title.textContent = s.title || "Untitled session";
          row.appendChild(title);
          var when = fmtWhen(s.last_activity);
          if (when) {
            var w = document.createElement("div");
            w.className = "when";
            w.textContent = when;
            row.appendChild(w);
          }
          row.addEventListener("click", function () { openSession(s.id); });
          sessionsEl.appendChild(row);
        });
      }

      function loadSessions() {
        return fetch("/api/sessions")
          .then(function (r) { return r.ok ? r.json() : { sessions: [] }; })
          .then(function (j) { renderSessions((j && j.sessions) || []); })
          .catch(function () {});
      }

      function clearLog() { log.textContent = ""; }

      function openSession(id) {
        if (send.disabled) return;
        fetch("/api/sessions/" + encodeURIComponent(id))
          .then(function (r) {
            if (!r.ok) throw new Error("not found");
            return r.json();
          })
          .then(function (j) {
            var s = (j && j.session) || {};
            sessionId = s.id || id;
            clearLog();
            (s.messages || []).forEach(function (m) {
              if (m.role === "user") {
                addText("me", m.content);
              } else if (m.role === "assistant") {
                var el = document.createElement("div");
                el.className = "msg oscar";
                var label = document.createElement("span");
                label.className = "role";
                label.textContent = "OSCAR";
                el.appendChild(label);
                var body = document.createElement("div");
                body.className = "md";
                body.innerHTML = window.renderMarkdown(m.content);
                el.appendChild(body);
                log.appendChild(el);
              }
            });
            scrollDown(true);
            loadSessions();
            input.focus();
          })
          .catch(function () {
            addText("system", "Could not open that session.");
          });
      }

      function newSession() {
        if (send.disabled) return;
        sessionId = null;
        clearLog();
        loadSessions();
        input.focus();
      }
      newBtn.addEventListener("click", newSession);

      loadSessions();
    })();
  </script>
</body>
</html>
