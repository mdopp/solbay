<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Solilos — Chat</title>
  <style>
    :root {
      --bg: #f6f6f4;
      --panel: #ffffff;
      --ink: #1f2227;
      --muted: #6b7079;
      --line: #e4e4e0;
      --accent: #3a6ea5;
      --bubble-me: #eef2f7;
      --bubble-sol: #f3f3f0;
      --radius: 12px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #16181c;
        --panel: #1d2025;
        --ink: #e8e9ea;
        --muted: #9aa0a8;
        --line: #2a2e34;
        --accent: #7aa7d6;
        --bubble-me: #25303d;
        --bubble-sol: #232730;
      }
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; overflow: hidden; }
    body {
      font: 15px/1.5 system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--ink);
      display: flex;
      justify-content: center;
    }
    .shell {
      width: 100%;
      max-width: 1040px;
      display: flex;
      height: 100vh;
      min-height: 0;
    }
    .sidebar {
      width: 260px;
      flex: 0 0 260px;
      border-right: 1px solid var(--line);
      background: var(--panel);
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .sidebar .top {
      padding: 14px;
      border-bottom: 1px solid var(--line);
    }
    #new-session {
      width: 100%;
      padding: 9px 12px;
      text-align: center;
    }
    #sessions {
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
      padding: 6px;
    }
    .session {
      padding: 9px 11px;
      border-radius: 9px;
      cursor: pointer;
      margin-bottom: 2px;
    }
    .session:hover { background: var(--bubble-sol); }
    .session.active { background: var(--bubble-me); }
    .session .title {
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .session .when { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .sessions-empty { padding: 12px; color: var(--muted); font-size: 13px; }
    .app {
      flex: 1 1 auto;
      min-width: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      min-height: 0;
    }
    header {
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      font-weight: 600;
      letter-spacing: 0.2px;
      display: flex;
      align-items: baseline;
      gap: 8px;
    }
    #sidebar-toggle {
      display: none;
      padding: 0;
      width: 34px;
      height: 30px;
      background: none;
      color: var(--ink);
      font-size: 18px;
      align-self: center;
    }
    #backdrop { display: none; }

    /* Mobile: the sidebar overlays the chat instead of stealing width, and
       is collapsed by default — a hamburger in the header toggles it. */
    @media (max-width: 720px) {
      #sidebar-toggle { display: inline-block; }
      .sidebar {
        position: fixed;
        top: 0;
        left: 0;
        bottom: 0;
        z-index: 20;
        width: 78%;
        max-width: 300px;
        flex-basis: auto;
        transform: translateX(-100%);
        transition: transform 0.2s ease;
      }
      body.sidebar-open .sidebar { transform: translateX(0); }
      body.sidebar-open #backdrop {
        display: block;
        position: fixed;
        inset: 0;
        z-index: 10;
        background: rgba(0, 0, 0, 0.35);
      }
    }
    header .sub { font-weight: 400; color: var(--muted); font-size: 13px; }
    #log {
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .msg { max-width: 80%; padding: 10px 13px; border-radius: var(--radius); word-wrap: break-word; overflow-wrap: anywhere; }
    .msg.me { align-self: flex-end; background: var(--bubble-me); white-space: pre-wrap; }
    .msg.sol { align-self: flex-start; background: var(--bubble-sol); }
    .msg.system { align-self: center; color: var(--muted); background: none; font-size: 13px; padding: 4px; }
    .role { display: block; font-size: 11px; color: var(--muted); margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.5px; }

    /* Rendered-markdown spacing inside an assistant bubble. */
    .md > :first-child { margin-top: 0; }
    .md > :last-child { margin-bottom: 0; }
    .md p { margin: 0 0 8px; }
    .md ul, .md ol { margin: 0 0 8px; padding-left: 22px; }
    .md li { margin: 2px 0; }
    .md h1, .md h2, .md h3, .md h4, .md h5, .md h6 { margin: 10px 0 6px; line-height: 1.3; }
    .md h1 { font-size: 1.4em; } .md h2 { font-size: 1.25em; } .md h3 { font-size: 1.1em; }
    .md a { color: var(--accent); }
    .md code {
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
      font-size: 0.92em;
      background: rgba(127, 127, 127, 0.18);
      padding: 1px 5px;
      border-radius: 5px;
    }
    .md pre {
      margin: 0 0 8px;
      padding: 10px 12px;
      background: rgba(127, 127, 127, 0.14);
      border-radius: 8px;
      overflow-x: auto;
    }
    .md pre code { background: none; padding: 0; font-size: 0.9em; }
    .md blockquote {
      margin: 0 0 8px;
      padding: 2px 12px;
      border-left: 3px solid var(--line);
      color: var(--muted);
    }
    .md hr { border: none; border-top: 1px solid var(--line); margin: 10px 0; }

    /* Activity / thinking indicator. */
    .activity { display: flex; align-items: center; gap: 8px; color: var(--muted); font-size: 13px; }
    .dots { display: inline-flex; gap: 3px; }
    .dots span {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--muted); opacity: 0.4;
      animation: blink 1.2s infinite ease-in-out;
    }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%, 80%, 100% { opacity: 0.3; } 40% { opacity: 1; } }
    form {
      display: flex;
      gap: 8px;
      padding: 14px 18px;
      border-top: 1px solid var(--line);
      background: var(--panel);
    }
    textarea {
      flex: 1;
      resize: none;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 10px 12px;
      font: inherit;
      line-height: 1.4;
      background: var(--bg);
      color: var(--ink);
      max-height: 168px;
      overflow-y: auto;
    }
    textarea:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
    button {
      border: none;
      border-radius: var(--radius);
      padding: 0 18px;
      background: var(--accent);
      color: #fff;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
    }
    button:disabled { opacity: 0.5; cursor: default; }

    /* Header nav + personality picker. */
    header .grow { flex: 1 1 auto; }
    .nav { display: flex; gap: 4px; }
    .nav button {
      background: none; color: var(--muted); font-weight: 500;
      padding: 5px 11px; border-radius: 8px; font-size: 13px;
    }
    .nav button:hover { background: var(--bubble-sol); color: var(--ink); }
    .nav button.active { background: var(--bubble-me); color: var(--ink); }
    .persona {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--muted);
    }
    .persona select {
      font: inherit; font-size: 13px; padding: 4px 8px;
      border: 1px solid var(--line); border-radius: 8px;
      background: var(--bg); color: var(--ink);
    }
    .admin-badge {
      font-size: 10px; letter-spacing: 0.5px; text-transform: uppercase;
      color: var(--accent); border: 1px solid var(--accent);
      border-radius: 6px; padding: 1px 6px;
    }

    /* View switching: only one of chat/skills/soul is shown. */
    .view { flex: 1 1 auto; min-height: 0; display: none; flex-direction: column; }
    .view.active { display: flex; }
    .pane {
      flex: 1 1 auto; min-height: 0; overflow-y: auto; padding: 18px;
    }
    .pane h2 { margin: 0 0 4px; font-size: 18px; }
    .pane .lead { color: var(--muted); font-size: 13px; margin: 0 0 16px; }

    /* Skill list cards. */
    .skill-card {
      border: 1px solid var(--line); border-radius: 10px;
      padding: 12px 14px; margin-bottom: 8px; cursor: pointer;
      background: var(--panel);
    }
    .skill-card:hover { border-color: var(--accent); }
    .skill-card .name { font-weight: 600; font-size: 14px; }
    .skill-card .desc { color: var(--muted); font-size: 13px; margin-top: 3px; }
    .reader-bar {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 18px; border-bottom: 1px solid var(--line);
    }
    .reader-bar .back {
      background: none; color: var(--accent); font-weight: 500;
      padding: 4px 8px; font-size: 13px;
    }
    .reader-bar .name { font-weight: 600; }
    /* The rendered markdown body in a reading pane (skill / soul). */
    .doc { max-width: 760px; }
    .doc .md { font-size: 15px; line-height: 1.6; }
    .empty-note { color: var(--muted); font-size: 13px; }

    /* Admin edit affordance + monospace editor. */
    .edit-btn {
      background: none; color: var(--accent); font-weight: 500;
      padding: 4px 11px; font-size: 13px; border-radius: 8px;
    }
    .edit-btn:hover { background: var(--bubble-sol); }
    .editor-wrap { display: flex; flex-direction: column; height: 100%; gap: 10px; }
    .code-editor {
      flex: 1 1 auto; min-height: 0; width: 100%; resize: none;
      font-family: ui-monospace, "Cascadia Code", "JetBrains Mono", Menlo, Consolas, monospace;
      font-size: 13px; line-height: 1.55; tab-size: 2;
      border: 1px solid var(--line); border-radius: 8px; padding: 12px 14px;
      background: var(--bg); color: var(--ink);
    }
    .code-editor:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
    .editor-bar { display: flex; align-items: center; gap: 10px; }
    .editor-bar .secondary {
      background: none; color: var(--muted); border: 1px solid var(--line);
    }
    .editor-status { font-size: 13px; color: var(--muted); }
    .editor-status.ok { color: #2e7d32; }
    .editor-status.warn { color: #b26a00; }
    .editor-status.err { color: #c33; }
    @media (prefers-color-scheme: dark) {
      .editor-status.ok { color: #7bc47f; }
      .editor-status.warn { color: #e0a458; }
      .editor-status.err { color: #e08585; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="top">
        <button id="new-session" type="button">+ New session</button>
      </div>
      <div id="sessions"></div>
    </aside>
    <div id="backdrop"></div>
    <div class="app">
      <header>
        <button id="sidebar-toggle" type="button" aria-label="Toggle sessions">☰</button>
        <nav class="nav" id="nav">
          <button type="button" data-view="chat" class="active">Chat</button>
          <button type="button" data-view="skills">Skills</button>
          <button type="button" data-view="soul">Soul</button>
        </nav>
        <span class="grow"></span>
        <span class="persona">
          <label for="personality">Persona</label>
          <select id="personality" aria-label="Personality for new sessions"></select>
        </span>
        <span id="admin-badge" class="admin-badge" hidden>Admin</span>
      </header>

      <section id="view-chat" class="view active">
        <div id="log" aria-live="polite"></div>
        <form id="composer">
          <textarea id="input" rows="1" placeholder="Message Solilos…" autofocus></textarea>
          <button id="send" type="submit">Send</button>
        </form>
      </section>

      <section id="view-skills" class="view">
        <div id="skills-list" class="pane">
          <h2>Skills</h2>
          <p class="lead">The standard set Sol draws on. Everyone can read them; editing is for admins.</p>
          <div id="skills-cards"></div>
        </div>
        <div id="skill-reader" style="display:none; flex:1 1 auto; min-height:0; flex-direction:column;">
          <div class="reader-bar">
            <button class="back" id="skill-back" type="button">← Skills</button>
            <span class="name" id="skill-name"></span>
            <span class="grow"></span>
            <button class="edit-btn" id="skill-edit" type="button" hidden>Edit</button>
          </div>
          <div class="pane" id="skill-view"><div class="doc"><div class="md" id="skill-body"></div></div></div>
          <div class="pane" id="skill-edit-pane" style="display:none;">
            <div class="editor-wrap">
              <textarea id="skill-editor" class="code-editor" spellcheck="false" aria-label="Skill source"></textarea>
              <div class="editor-bar">
                <button id="skill-save" type="button">Save</button>
                <button id="skill-cancel" class="secondary" type="button">Cancel</button>
                <span id="skill-status" class="editor-status"></span>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section id="view-soul" class="view">
        <div class="pane">
          <div class="doc">
            <h2>Soul</h2>
            <p class="lead">Sol's durable identity (SOUL.md). One soul — personalities are per-session overlays on top of it.</p>
            <div class="md" id="soul-body"></div>
          </div>
        </div>
      </section>
    </div>
  </div>
  <script src="/static/markdown.js"></script>
  <script>
    (function () {
      var log = document.getElementById("log");
      var form = document.getElementById("composer");
      var input = document.getElementById("input");
      var send = document.getElementById("send");
      var sessionsEl = document.getElementById("sessions");
      var newBtn = document.getElementById("new-session");
      var sidebarToggle = document.getElementById("sidebar-toggle");
      var backdrop = document.getElementById("backdrop");
      var personalitySel = document.getElementById("personality");
      var adminBadge = document.getElementById("admin-badge");
      var sessionId = null;

      function currentPersonality() { return personalitySel.value || "sol"; }

      function closeSidebar() { document.body.classList.remove("sidebar-open"); }
      sidebarToggle.addEventListener("click", function () {
        document.body.classList.toggle("sidebar-open");
      });
      backdrop.addEventListener("click", closeSidebar);

      function atBottom() {
        return log.scrollHeight - log.scrollTop - log.clientHeight < 40;
      }
      function scrollDown(stick) {
        if (stick) log.scrollTop = log.scrollHeight;
      }

      function addText(role, text) {
        var el = document.createElement("div");
        el.className = "msg " + role;
        if (role !== "system") {
          var label = document.createElement("span");
          label.className = "role";
          label.textContent = role === "me" ? "You" : "Solilos";
          el.appendChild(label);
        }
        el.appendChild(document.createTextNode(text));
        log.appendChild(el);
        scrollDown(true);
        return el;
      }

      // An assistant bubble that accumulates streamed text and re-renders it
      // as markdown. Holds a role label + a thinking indicator until the
      // first token, then a `.md` body.
      function addAssistant() {
        var el = document.createElement("div");
        el.className = "msg.sol";
        var label = document.createElement("span");
        label.className = "role";
        label.textContent = "Solilos";
        el.appendChild(label);

        var activity = document.createElement("div");
        activity.className = "activity";
        activity.innerHTML =
          '<span class="dots"><span></span><span></span><span></span></span>' +
          '<span class="activity-text">thinking…</span>';
        el.appendChild(activity);

        var body = document.createElement("div");
        body.className = "md";
        el.appendChild(body);
        log.appendChild(el);
        scrollDown(true);

        var buffer = "";
        return {
          setActivity: function (txt) {
            var t = activity.querySelector(".activity-text");
            if (t) t.textContent = txt;
          },
          append: function (delta) {
            var stick = atBottom();
            if (activity.parentNode) el.removeChild(activity);
            buffer += delta;
            body.innerHTML = window.renderMarkdown(buffer);
            scrollDown(stick);
          },
          finish: function () {
            if (activity.parentNode) el.removeChild(activity);
            if (!buffer) body.textContent = "(no reply)";
            else body.innerHTML = window.renderMarkdown(buffer);
            scrollDown(atBottom());
          },
          fail: function (msg) {
            el.removeChild(activity);
            el.className = "msg system";
            body.textContent = msg;
          }
        };
      }

      function autosize() {
        input.style.height = "auto";
        input.style.height = Math.min(input.scrollHeight, 168) + "px";
      }
      input.addEventListener("input", autosize);

      input.addEventListener("keydown", function (e) {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          form.requestSubmit();
        }
      });

      // Parse the proxy's SSE stream incrementally (fetch + ReadableStream;
      // EventSource can't POST a body).
      function streamChat(text, msg) {
        return fetch("/api/chat/stream", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ input: text, session_id: sessionId, personality: currentPersonality() })
        }).then(function (r) {
          if (!r.ok || !r.body) throw new Error("bad response");
          var reader = r.body.getReader();
          var decoder = new TextDecoder();
          var buf = "";

          function handle(event, data) {
            var d = {};
            try { d = JSON.parse(data); } catch (e) {}
            if (event === "session") {
              if (d.session_id) sessionId = d.session_id;
            } else if (event === "delta") {
              if (d.text) msg.append(d.text);
            } else if (event === "tool") {
              if (d.phase === "started") msg.setActivity("using " + (d.name || "tool") + "…");
              else msg.setActivity("thinking…");
            } else if (event === "error") {
              msg.fail("Solilos is unavailable right now. Please try again.");
            }
          }

          function flush() {
            var frames = buf.split("\n\n");
            buf = frames.pop();
            frames.forEach(function (frame) {
              var event = "message";
              var data = "";
              frame.split("\n").forEach(function (line) {
                if (line.indexOf("event:") === 0) event = line.slice(6).trim();
                else if (line.indexOf("data:") === 0) data += line.slice(5).replace(/^ /, "");
              });
              handle(event, data);
            });
          }

          function pump() {
            return reader.read().then(function (res) {
              if (res.done) { buf += "\n\n"; flush(); return; }
              buf += decoder.decode(res.value, { stream: true });
              flush();
              return pump();
            });
          }
          return pump();
        });
      }

      form.addEventListener("submit", function (e) {
        e.preventDefault();
        var text = input.value.trim();
        if (!text) return;
        var firstTurn = !sessionId;
        addText("me", text);
        input.value = "";
        autosize();
        send.disabled = true;
        var msg = addAssistant();

        streamChat(text, msg)
          .then(function () { msg.finish(); if (firstTurn) loadSessions(); })
          .catch(function () { msg.fail("Network error. Please try again."); })
          .finally(function () {
            send.disabled = false;
            input.focus();
          });
      });

      // --- Session list ---------------------------------------------------
      function fmtWhen(ts) {
        if (!ts) return "";
        // Hermes emits an epoch float (seconds); also tolerate an ISO string.
        var num = Number(ts);
        var d = isNaN(num) ? new Date(ts) : new Date(num * 1000);
        if (isNaN(d.getTime())) return "";
        return d.toLocaleString([], {
          month: "short", day: "numeric", hour: "2-digit", minute: "2-digit"
        });
      }

      function renderSessions(list) {
        sessionsEl.textContent = "";
        if (!list.length) {
          var empty = document.createElement("div");
          empty.className = "sessions-empty";
          empty.textContent = "No sessions yet.";
          sessionsEl.appendChild(empty);
          return;
        }
        list.forEach(function (s) {
          var row = document.createElement("div");
          row.className = "session" + (s.id === sessionId ? " active" : "");
          var title = document.createElement("div");
          title.className = "title";
          title.textContent = s.title || s.preview || "New session";
          row.appendChild(title);
          var when = fmtWhen(s.last_activity);
          if (when) {
            var w = document.createElement("div");
            w.className = "when";
            w.textContent = when;
            row.appendChild(w);
          }
          row.addEventListener("click", function () { openSession(s.id); });
          sessionsEl.appendChild(row);
        });
      }

      function loadSessions() {
        return fetch("/api/sessions")
          .then(function (r) { return r.ok ? r.json() : { sessions: [] }; })
          .then(function (j) { renderSessions((j && j.sessions) || []); })
          .catch(function () {});
      }

      function clearLog() { log.textContent = ""; }

      function openSession(id) {
        if (send.disabled) return;
        closeSidebar();
        fetch("/api/sessions/" + encodeURIComponent(id))
          .then(function (r) {
            if (!r.ok) throw new Error("not found");
            return r.json();
          })
          .then(function (j) {
            var s = (j && j.session) || {};
            sessionId = s.id || id;
            clearLog();
            (s.messages || []).forEach(function (m) {
              if (m.role === "user") {
                addText("me", m.content);
              } else if (m.role === "assistant") {
                var el = document.createElement("div");
                el.className = "msg.sol";
                var label = document.createElement("span");
                label.className = "role";
                label.textContent = "Solilos";
                el.appendChild(label);
                var body = document.createElement("div");
                body.className = "md";
                body.innerHTML = window.renderMarkdown(m.content);
                el.appendChild(body);
                log.appendChild(el);
              }
            });
            scrollDown(true);
            loadSessions();
            input.focus();
          })
          .catch(function () {
            addText("system", "Could not open that session.");
          });
      }

      function newSession() {
        if (send.disabled) return;
        sessionId = null;
        clearLog();
        loadSessions();
        closeSidebar();
        input.focus();
      }
      newBtn.addEventListener("click", newSession);

      // --- Personality ----------------------------------------------------
      // Chosen per session and applied when a session is born (Hermes sets the
      // overlay only at create time), so changing it takes effect on the next
      // new session. Stored locally so the choice survives a reload.
      function loadPersonalities() {
        return fetch("/api/personalities")
          .then(function (r) { return r.ok ? r.json() : { personalities: [] }; })
          .then(function (j) {
            var list = (j && j.personalities) || [];
            var saved = localStorage.getItem("sol.personality") || "sol";
            personalitySel.textContent = "";
            list.forEach(function (p) {
              var opt = document.createElement("option");
              opt.value = p.id;
              opt.textContent = p.label;
              opt.title = p.description;
              if (p.id === saved) opt.selected = true;
              personalitySel.appendChild(opt);
            });
            personalitySel.title = "Applies to the next new session";
          })
          .catch(function () {});
      }
      personalitySel.addEventListener("change", function () {
        localStorage.setItem("sol.personality", personalitySel.value);
      });

      // --- Identity (admin badge + edit affordances) ---------------------
      var isAdmin = false;
      function loadWhoami() {
        return fetch("/api/whoami")
          .then(function (r) { return r.ok ? r.json() : {}; })
          .then(function (j) {
            isAdmin = !!(j && j.is_admin);
            if (isAdmin) adminBadge.hidden = false;
          })
          .catch(function () {});
      }

      // --- View switching -------------------------------------------------
      var views = {
        chat: document.getElementById("view-chat"),
        skills: document.getElementById("view-skills"),
        soul: document.getElementById("view-soul")
      };
      var navBtns = document.querySelectorAll("#nav button");
      var skillsLoaded = false, soulLoaded = false;

      function showView(name) {
        Object.keys(views).forEach(function (k) {
          views[k].classList.toggle("active", k === name);
        });
        navBtns.forEach(function (b) {
          b.classList.toggle("active", b.getAttribute("data-view") === name);
        });
        if (name === "skills" && !skillsLoaded) { skillsLoaded = true; loadSkills(); }
        if (name === "soul" && !soulLoaded) { soulLoaded = true; loadSoul(); }
        closeSidebar();
      }
      navBtns.forEach(function (b) {
        b.addEventListener("click", function () { showView(b.getAttribute("data-view")); });
      });

      // --- Skills ---------------------------------------------------------
      var skillsCards = document.getElementById("skills-cards");
      var skillsList = document.getElementById("skills-list");
      var skillReader = document.getElementById("skill-reader");
      var skillName = document.getElementById("skill-name");
      var skillBody = document.getElementById("skill-body");
      var skillView = document.getElementById("skill-view");
      var skillEditPane = document.getElementById("skill-edit-pane");
      var skillEditBtn = document.getElementById("skill-edit");
      var skillEditor = document.getElementById("skill-editor");
      var skillSave = document.getElementById("skill-save");
      var skillCancel = document.getElementById("skill-cancel");
      var skillStatus = document.getElementById("skill-status");
      var currentSkillId = null;
      var currentSkillRaw = "";

      function skillViewMode() {
        skillEditPane.style.display = "none";
        skillView.style.display = "block";
        skillEditBtn.hidden = !isAdmin;
      }
      function setStatus(msg, kind) {
        skillStatus.className = "editor-status" + (kind ? " " + kind : "");
        skillStatus.textContent = msg || "";
      }

      function loadSkills() {
        return fetch("/api/skills")
          .then(function (r) { return r.ok ? r.json() : { skills: [] }; })
          .then(function (j) {
            var list = (j && j.skills) || [];
            skillsCards.textContent = "";
            if (!list.length) {
              var note = document.createElement("div");
              note.className = "empty-note";
              note.textContent = "No skills found.";
              skillsCards.appendChild(note);
              return;
            }
            list.forEach(function (s) {
              var card = document.createElement("div");
              card.className = "skill-card";
              var name = document.createElement("div");
              name.className = "name";
              name.textContent = s.name;
              card.appendChild(name);
              if (s.description) {
                var desc = document.createElement("div");
                desc.className = "desc";
                desc.textContent = s.description;
                card.appendChild(desc);
              }
              card.addEventListener("click", function () { openSkill(s.id); });
              skillsCards.appendChild(card);
            });
          })
          .catch(function () {});
      }

      function openSkill(id) {
        return fetch("/api/skills/" + encodeURIComponent(id))
          .then(function (r) { if (!r.ok) throw new Error("not found"); return r.json(); })
          .then(function (j) {
            var s = (j && j.skill) || {};
            currentSkillId = s.id || id;
            currentSkillRaw = s.raw || "";
            skillName.textContent = s.name || id;
            skillBody.innerHTML = window.renderMarkdown(s.body || "");
            setStatus("");
            skillViewMode();
            skillsList.style.display = "none";
            skillReader.style.display = "flex";
          })
          .catch(function () {});
      }
      document.getElementById("skill-back").addEventListener("click", function () {
        skillReader.style.display = "none";
        skillsList.style.display = "block";
        skillViewMode();
      });

      // Edit / Save / Cancel (admins only — the server enforces it too).
      skillEditBtn.addEventListener("click", function () {
        skillEditor.value = currentSkillRaw;
        setStatus("");
        skillView.style.display = "none";
        skillEditBtn.hidden = true;
        skillEditPane.style.display = "block";
        skillEditor.focus();
      });
      skillCancel.addEventListener("click", skillViewMode);
      skillSave.addEventListener("click", function () {
        var content = skillEditor.value;
        if (!content.trim()) { setStatus("Can't save an empty skill.", "err"); return; }
        skillSave.disabled = true;
        setStatus("Saving…");
        fetch("/api/skills/" + encodeURIComponent(currentSkillId), {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ content: content })
        })
          .then(function (r) {
            if (r.status === 403) throw new Error("forbidden");
            if (!r.ok) throw new Error("save failed");
            return r.json();
          })
          .then(function (j) {
            return openSkill(currentSkillId).then(function () {
              setStatus(
                j.restart_needed
                  ? "Saved. Frontmatter changed — restart Hermes to re-register this skill."
                  : "Saved.",
                j.restart_needed ? "warn" : "ok"
              );
            });
          })
          .catch(function (e) {
            setStatus(
              e.message === "forbidden"
                ? "Only admins can edit skills."
                : "Could not save. Please try again.",
              "err"
            );
          })
          .finally(function () { skillSave.disabled = false; });
      });

      // --- Soul -----------------------------------------------------------
      function loadSoul() {
        var body = document.getElementById("soul-body");
        return fetch("/api/soul")
          .then(function (r) { return r.ok ? r.json() : { soul: { content: "" } }; })
          .then(function (j) {
            var content = (j && j.soul && j.soul.content) || "";
            body.innerHTML = content
              ? window.renderMarkdown(content)
              : '<p class="empty-note">No soul document found.</p>';
          })
          .catch(function () {
            body.innerHTML = '<p class="empty-note">Could not load the soul document.</p>';
          });
      }

      loadPersonalities();
      loadWhoami();
      loadSessions();
    })();
  </script>
</body>
</html>
