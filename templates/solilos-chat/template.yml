apiVersion: v1
kind: Pod
metadata:
  name: solilos-chat
  labels:
    app: solilos-chat
  annotations:
    servicebay.label: "Chat"
    servicebay.schema-version: "1"
    servicebay.ports: "{{HERMES_CHAT_PORT}}/tcp"
    # Stateless household chat surface (#140). A tiny own image serving a
    # static chat page over Hermes' native session API — replaces the
    # fragile in-process nesquena/hermes-webui (#139), which ran the agent
    # in-process and broke on :latest drift. No own data store; all
    # chat/session/memory lives in Hermes (~/.hermes). Behind Authelia
    # forward-auth, the proxy reads the Remote-User header → Hermes uid so
    # there's no second login (#134); API_SERVER_KEY stays server-side.
    servicebay.dependencies: "ollama,hermes,nginx,auth"
    # HTTP health probe — the proxy serves /health (200, no auth) once up.
    # ServiceBay can't substitute {{VAR}} inside an annotation block scalar
    # (#136), so the port is the literal default; an operator changing
    # HERMES_CHAT_PORT must update this literal by hand too.
    servicebay.healthcheck: |
      url: http://127.0.0.1:8787/health
      interval: 30s
      timeout: 5s
      startup_timeout: 2m
spec:
  # hostNetwork so the proxy reaches Hermes' API at
  # 127.0.0.1:{{HERMES_API_PORT}} (two hostNetwork pods share the host
  # netns). NPM (also hostNetwork) proxies the public chat.<publicDomain>
  # down to our loopback bind behind Authelia forward-auth.
  hostNetwork: true
  restartPolicy: Always
  containers:
  - name: solilos-chat
    image: "{{HERMES_CHAT_IMAGE}}"
    env:
    - name: SOLILOS_COMPONENT
      value: "chat"
    # Bind loopback only — a 0.0.0.0 bind under hostNetwork would put the
    # chat surface on the LAN, bypassing Authelia. Only NPM reaches it.
    - name: CHAT_HOST
      value: "127.0.0.1"
    - name: CHAT_PORT
      value: "{{HERMES_CHAT_PORT}}"
    - name: HERMES_URL
      value: "http://127.0.0.1:{{HERMES_API_PORT}}"
    # Bearer for Hermes' native API — held server-side, never in browser JS.
    - name: API_SERVER_KEY
      value: "{{HERMES_API_KEY}}"
    # Authelia forwards the authenticated identity on Remote-User via NPM;
    # the proxy folds it into the Hermes uid (#134). Absent header (direct
    # loopback offline test) falls back to DEFAULT_UID.
    - name: REMOTE_USER_HEADER
      value: "Remote-User"
    # Authelia also forwards the user's groups (comma-separated). The panel
    # surfaces admin-only controls (skill/soul/model edits — phase 2) when
    # this header lists ADMIN_GROUP.
    - name: REMOTE_GROUPS_HEADER
      value: "Remote-Groups"
    - name: ADMIN_GROUP
      value: "admins"
    - name: DEFAULT_UID
      value: "{{DEFAULT_UID}}"
    # Read-write mount of the skill pack so admins can edit the standard set
    # from the panel (Hermes exposes no skill-body API). Soul + model are
    # read AND written through the config sidecar, so the chat pod needs no
    # SOUL.md / config mount of its own.
    - name: SKILLS_DIR
      value: "/data/skills"
    # The config sidecar in the hermes pod (loopback; both pods hostNetwork).
    # The panel reads + writes the soul and switches the model through it,
    # because the chat pod can't touch Hermes' own data dir. Auth reuses
    # API_SERVER_KEY (above).
    - name: CONFIG_AGENT_URL
      value: "{{CONFIG_AGENT_URL}}"
    # Context window (tokens) = the chat-compaction cap (#210) + /context.
    # Empty/auto => AUTO-DERIVE from the live Ollama active model at runtime
    # (#235): the proxy reads OLLAMA_URL's /api/ps for the window the model is
    # actually loaded at, so the cap matches the loaded model and adapts per
    # model. A positive integer OVERRIDES the derivation (ops control).
    - name: CONTEXT_WINDOW
      value: "{{CONTEXT_WINDOW}}"
    # Where Ollama's API lives (host loopback; hostNetwork pod). Queried for the
    # active model's loaded context window when CONTEXT_WINDOW auto-derives.
    - name: OLLAMA_URL
      value: "{{OLLAMA_URL}}"
    # Optional Authelia logout URL for the sidebar footer; empty hides the
    # link (no dead link when unset).
    - name: LOGOUT_URL
      value: "{{LOGOUT_URL}}"
    # Where the proxy persists image attachments Hermes drops (#202): Hermes
    # stores an inbound image as a `[screenshot]` placeholder with no way to
    # read the pixels back, so the proxy holds them here and re-attaches them
    # on history load. The one stateful store in an otherwise stateless pod.
    - name: ATTACHMENTS_DIR
      value: "/data/attachments"
    # CSP `frame-ancestors` source list (#228): who may iframe the chat.
    # Default `'self'`; the ServiceBay maintenance embed sets
    # `'self' https://admin.dopp.cloud` so admin.dopp.cloud can frame it.
    - name: FRAME_ANCESTORS
      value: "{{FRAME_ANCESTORS}}"
    # Adaptive model routing (latency bundle): the model is bound at Hermes
    # session create from the chosen reasoning effort. A Schnell/FAST
    # conversation → FAST_MODEL (gemma4:e2b: ~4× faster prefill + reliable HA
    # tool-calls); a Gründlich/thorough one → THOROUGH_MODEL (gemma4:12b).
    # Empty leaves routing off (Hermes' configured model.model is used).
    - name: FAST_MODEL
      value: "{{FAST_MODEL}}"
    - name: THOROUGH_MODEL
      value: "{{THOROUGH_MODEL}}"
    - name: TZ
      value: "{{TZ}}"
    # solilos.db holds the topics registry + chat<->topic assignments (#241).
    # Same file the schema-init sidecar (solbay pod) migrates and the gatekeeper
    # reads for voice speaker-ID. Bind-mounted read-write so topic operations
    # can write session_topics rows.
    - name: SOLILOS_DB_PATH
      value: "/var/lib/solilos/solilos.db"
    # The Obsidian notes vault (Syncthing-synced), read for the topic dashboard's
    # per-topic note list (#244). Same path the ingestion/notes-search skills use
    # inside the Hermes runtime.
    - name: NOTES_DIR
      value: "/opt/data/notes"
    # No `ports:` block — hostNetwork pod, the listener binds the host
    # directly (loopback:{{HERMES_CHAT_PORT}}); a ports mapping alongside
    # hostNetwork makes `podman kube play` reject the spec (same constraint
    # as the gatekeeper).
    # Skills mount read-write so admins can edit the standard set: the skills
    # host dir is owned by the host user and this pod is rootless
    # (container-root maps to that user), so it can replace files there. A
    # body edit is live; a frontmatter change needs a Hermes restart, which
    # the panel surfaces.
    volumeMounts:
    - mountPath: /data/skills
      name: solilos-skills
    - mountPath: /data/attachments
      name: solilos-chat-attachments
    - mountPath: /var/lib/solilos
      name: solilos-data
    - mountPath: /opt/data/notes
      name: solilos-notes
  volumes:
  - name: solilos-skills
    hostPath:
      path: {{DATA_DIR}}/solbay/skills
      type: DirectoryOrCreate
  # Image-attachment store (#202): re-rendered in chat history after refresh.
  - name: solilos-chat-attachments
    hostPath:
      path: {{DATA_DIR}}/solbay/chat-attachments
      type: DirectoryOrCreate
  # solilos.db: topics registry + chat<->topic assignments (#241).
  - name: solilos-data
    hostPath:
      path: {{DATA_DIR}}/solbay
      type: DirectoryOrCreate
  # Notes vault (Syncthing): topic dashboard reads notes tagged #topic/<slug>.
  - name: solilos-notes
    hostPath:
      path: {{DATA_DIR}}/file-share/data/notes
      type: DirectoryOrCreate
