apiVersion: v1
kind: Pod
metadata:
  name: ollama
  labels:
    app: ollama
  annotations:
    servicebay.label: "AI Engine (Ollama)"
    servicebay.schema-version: "5"
    servicebay.ports: "{{OLLAMA_PORT}}/tcp"
    # No `servicebay.tier` — Ollama is opt-in AI infrastructure, not a
    # platform foundation. Bind it to 127.0.0.1 by default (see
    # OLLAMA_HOST below) because Ollama ships no auth; LAN-wide
    # exposure would be a regression on a household install. Remote
    # access goes through NPM forward-auth → Authelia using the
    # `__authelia_forward_auth__` sentinel from
    # src/lib/stackInstall/forwardAuth.ts.
    # Continuous health probe (#628). `/api/tags` returns 200 with the
    # empty-list JSON once the model-store has been opened — same
    # signal the readiness probe used (now removed).
    servicebay.healthcheck: |
      url: http://127.0.0.1:{{OLLAMA_PORT}}/api/tags
      interval: 30s
      timeout: 5s
      startup_timeout: 5m
spec:
  # hostNetwork so other ServiceBay templates (hermes, solbay)
  # can reach Ollama at 127.0.0.1:{{OLLAMA_PORT}} via the host netns.
  # Two hostNetwork pods share the host's network namespace, which is
  # what makes the localhost-cross-pod story work without DNS or
  # bridge networking.
  hostNetwork: true
  containers:
  - name: ollama
    image: docker.io/ollama/ollama:latest
    env:
    # Default-bind to loopback. Operators who want LAN access put the
    # service behind NPM + Authelia (forward-auth pattern, see #495 /
    # #508 for the existing AdGuard + Syncthing wiring).
    - name: OLLAMA_HOST
      value: "127.0.0.1:{{OLLAMA_PORT}}"
    # Force Ollama's DEFAULT load context. Stock default is 4096, but
    # Hermes' system prompt is 4157 tokens → ~1 token left for output →
    # finish_reason='length' loop (#146). Hermes injects
    # options.num_ctx, but Ollama's /v1/chat/completions ignores
    # per-request num_ctx — only this env-set default actually applies.
    - name: OLLAMA_CONTEXT_LENGTH
      value: "{{OLLAMA_CONTEXT_LENGTH}}"
    # Keep a model loaded after its last request so a conversational pause —
    # or an overnight gap — doesn't pay a cold model RELOAD next turn (stock
    # 5m evicts too soon). 24h (#268): with MAX_LOADED_MODELS=1 only one chat
    # model is ever resident, so the old co-residency VRAM concern that capped
    # this at 60m is gone. See OLLAMA_KEEP_ALIVE.
    - name: OLLAMA_KEEP_ALIVE
      value: "{{OLLAMA_KEEP_ALIVE}}"
    # Keep BOTH chat + embed models resident (default 2). Box-measured
    # 2026-06-10: this cap is GLOBAL and the embed model IS counted, so at 1
    # every embedding evicts the chat model → next turn pays a ~6.75s reload +
    # ~2.6s cold prefill. See OLLAMA_MAX_LOADED_MODELS.
    - name: OLLAMA_MAX_LOADED_MODELS
      value: "{{OLLAMA_MAX_LOADED_MODELS}}"
    # Flash attention: negligible speed change on this GPU class but
    # harmless, and the prerequisite for optional KV-cache quant.
    - name: OLLAMA_FLASH_ATTENTION
      value: "{{OLLAMA_FLASH_ATTENTION}}"
    # GPU passthrough (CDI). OLLAMA_GPU_PASSTHROUGH=yes renders the
    # resources block below. (Blank does not render it, but post-deploy
    # still auto-engages the GPU when /etc/cdi/nvidia.yaml exists — see
    # below.) The block is kept
    # for documentation + as a fallback signal — `podman kube play`
    # in 5.x silently drops `resources.limits.nvidia.com/gpu`, so the
    # actual passthrough is done by post-deploy.py's
    # install_gpu_quadlet_fallback() which swaps this .kube unit for
    # a `.container` Quadlet with `AddDevice=nvidia.com/gpu=all`
    # + `SecurityLabelDisable=true`. Both lines are required on
    # rootless FCoS — the device alone leaves NVML at "Insufficient
    # Permissions" because SELinux blocks NVML init. See #1026 for
    # the full diagnostic trail.
    ports:
    - containerPort: {{OLLAMA_PORT}}
    {{#OLLAMA_GPU_PASSTHROUGH}}
    resources:
      limits:
        nvidia.com/gpu: "1"
    {{/OLLAMA_GPU_PASSTHROUGH}}
    volumeMounts:
    - mountPath: /root/.ollama
      name: ollama-data
  volumes:
  - name: ollama-data
    hostPath:
      path: {{DATA_DIR}}/ollama
      type: DirectoryOrCreate
