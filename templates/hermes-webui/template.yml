apiVersion: v1
kind: Pod
metadata:
  name: hermes-webui
  labels:
    app: hermes-webui
  annotations:
    servicebay.label: "Chat"
    servicebay.schema-version: "1"
    servicebay.ports: "{{HERMES_WEBUI_PORT}}/tcp"
    # Hermes-native chat surface — talks directly to the local Hermes
    # agent's API server. Replaces the Open WebUI template (#1044): same
    # chat URL `chat.<publicDomain>` but the agent-side features (Skills,
    # Sessions, Profiles, model/profile switcher, context-usage ring)
    # actually surface in the UI now that we're not going through an
    # OpenAI-shim. nesquena/hermes-webui is upstream — community-maintained
    # but Hermes-native, with parity to the CLI experience.
    servicebay.dependencies: "ollama,hermes,nginx,auth"
    # Continuous health probe — hermes-webui ships a /health endpoint
    # that returns 200 once the daemon is up and connected to the
    # ~/.hermes config.
    servicebay.healthcheck: |
      url: http://127.0.0.1:{{HERMES_WEBUI_PORT}}/health
      interval: 30s
      timeout: 5s
      startup_timeout: 5m
spec:
  # hostNetwork so we share `127.0.0.1` with hermes — hermes-webui
  # reaches Hermes' API at the same loopback we bind it on. NPM (also
  # hostNetwork) proxies the public `chat.<publicDomain>` to our
  # `127.0.0.1:HERMES_WEBUI_PORT` behind Authelia forward-auth.
  hostNetwork: true
  containers:
  - name: hermes-webui
    image: ghcr.io/nesquena/hermes-webui:latest
    env:
    # Bind to the loopback NPM proxies. Direct LAN hits would bypass
    # Authelia; chat history surfaces every conversation, treat it
    # like the Hermes dashboard.
    - name: HERMES_WEBUI_HOST
      value: "127.0.0.1"
    - name: HERMES_WEBUI_PORT
      value: "{{HERMES_WEBUI_PORT}}"
    # Belt-and-suspenders on top of Authelia. Authelia is the primary
    # gate (forward-auth at the NPM layer); HERMES_WEBUI_PASSWORD is
    # the in-app secondary check so a misconfigured proxy can't expose
    # the chat surface unauthenticated. Auto-generated by the wizard.
    - name: HERMES_WEBUI_PASSWORD
      value: "{{HERMES_WEBUI_PASSWORD}}"
    # State (per-user preferences, session cache) lives inside the
    # shared `~/.hermes` volume so a reinstall preserves it. hermes-webui
    # treats `~/.hermes/webui/` as its state dir per upstream README.
    - name: HERMES_WEBUI_STATE_DIR
      value: "/home/hermeswebui/.hermes/webui"
    # The container's entrypoint chowns the mounted .hermes dir to
    # match (WANTED_UID, WANTED_GID) so files written by either
    # hermes-webui or hermes itself stay readable across both pods.
    # The gateway image (nousresearch/hermes-agent) runs as uid=10000
    # and its initContainer chowns /opt/data to 10000:10000; we must
    # match that uid here or the webui's entrypoint re-chowns the shared
    # dir out from under the gateway, breaking its kanban lock/db writes.
    - name: WANTED_UID
      value: "10000"
    - name: WANTED_GID
      value: "10000"
    ports:
    - containerPort: {{HERMES_WEBUI_PORT}}
    volumeMounts:
    # Mount Hermes' /opt/data (the `hermes-data` volume the hermes pod
    # uses) at hermes-webui's expected ~/.hermes/. This is the entire
    # point of the integration: hermes-webui reads sessions / models /
    # skills / profiles from the same .hermes home Hermes itself uses,
    # so the two stay in lockstep without a sync layer.
    - mountPath: /home/hermeswebui/.hermes
      name: hermes-home
    # Optional workspace browser pointed at the syncthing'd notes dir.
    # Read-only here — hermes-webui has its own file-write controls and
    # we don't want it touching the Obsidian vault directly. Picked the
    # notes dir specifically because it's the surface a household
    # resident would actually want to browse from chat (link to a note,
    # ask Hermes about it).
    - mountPath: /workspace
      name: syncthing-notes
      readOnly: true
  volumes:
  # Shared with the hermes template's `hermes-data` mount — same hostPath,
  # same SELinux context. hermes' post-deploy.py is the canonical writer
  # of config.yaml / .env / sessions; hermes-webui just reads.
  - name: hermes-home
    hostPath:
      path: {{DATA_DIR}}/hermes
      type: DirectoryOrCreate
  - name: syncthing-notes
    hostPath:
      path: {{DATA_DIR}}/file-share/data/notes
      type: DirectoryOrCreate
