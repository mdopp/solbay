name: solbay
version: "0.1.0"
description: |
  Solilos — household AI assistant.

  Provides a Hermes skill pack (audit-query, daily-chronicle, debug-set,
  dynamic-skills, media-ingestion-multimodal, notes-search, room-enrollment,
  status) plus the ServiceBay
  templates and
  container images that deploy the household pod (solbay)
  alongside Hermes + Ollama. Installable two ways:

  - As a Hermes plugin via Skills → Install from URL: clone this repo
    to ~/.hermes/plugins/solbay/. The __init__.py at the repo root
    walks templates/solbay/skills/ and registers each
    SKILL.md via ctx.register_skill(...).

  - As a ServiceBay external registry (mdopp/solbay) alongside
    mdopp/servicebay-templates. The solbay template's
    post-deploy.py copies templates/solbay/skills/ into
    Hermes' bind-mount target {{DATA_DIR}}/solbay/skills/
    where Hermes' built-in skill loader auto-discovers them.
